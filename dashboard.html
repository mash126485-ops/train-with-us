<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard | Coaches.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #000; --card: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; padding: 40px 5%; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        .logo { font-weight: 900; font-size: 1.2rem; }
        .logout { color: #555; text-decoration: none; font-size: 0.8rem; border: 1px solid #333; padding: 5px 15px; }

        .welcome-section h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -2px; }
        .status-badge { background: #222; color: var(--accent); padding: 5px 12px; font-size: 0.7rem; font-weight: 700; border-radius: 20px; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: var(--card); padding: 30px; border: 1px solid #222; position: relative; }
        .card h3 { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .card p { font-size: 1.5rem; font-weight: 700; }

        .program-locked { margin-top: 40px; padding: 60px; background: #050505; border: 1px dashed #333; text-align: center; }
        .program-locked p { color: #555; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">COACHES.COM <span style="font-weight: 400; color: #666;">| PORTAL</span></div>
        <a href="index.html" class="logout" onclick="localStorage.clear()">LOGOUT</a>
    </div>

    <div class="welcome-section">
        <span class="status-badge" id="displayStatus">Loading...</span>
        <h1>Hello, <span id="displayName" style="color: var(--accent);">Athlete</span>.</h1>
        <p style="color: #888;">Here is your current transformation roadmap.</p>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Primary Focus</h3>
            <p id="displayGoal">---</p>
        </div>
        <div class="card">
            <h3>Weekly Commitment</h3>
            <p><span id="displayDays">0</span> Days / Week</p>
        </div>
        <div class="card">
            <h3>Assigned Coach</h3>
            <p>Liz Achoki</p>
        </div>
    </div>

    <div class="program-locked">
        <p>Your custom training blocks are being generated based on your intake data. Check back in 24 hours.</p>
    </div>

    <script>
        // Read data from LocalStorage
        const data = JSON.parse(localStorage.getItem('clientProfile'));

        if (data) {
            document.getElementById('displayName').innerText = data.name;
            document.getElementById('displayGoal').innerText = data.goal;
            document.getElementById('displayDays').innerText = data.days;
            document.getElementById('displayStatus').innerText = data.status;
        } else {
            // If no data, send them back to fill the form
            window.location.href = 'intake.html';
        }
    </script>
</body>
  </html>
